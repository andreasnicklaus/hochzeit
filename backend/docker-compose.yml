services:
  app:
    build: .
    ports:
      - "3000:3000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hochzeit
      POSTGRES_PASSWORD: hochzeit
      POSTGRES_DB: hochzeit
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/001_create_rsvps.sql:/docker-entrypoint-initdb.d/001_create_rsvps.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hochzeit"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
